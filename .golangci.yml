version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - gocritic
    - nolintlint
    # Error handling
    - errorlint
    - nilerr
    # Safety
    - bodyclose
    - forcetypeassert
    - gosec
    - nilnesserr
    # Code quality
    - predeclared
    - dupword
    # Modern Go idioms
    - modernize
    - perfsprint
    - exhaustive
    - intrange
    - copyloopvar
    # Consistency
    - recvcheck
    - nilnil
    # Testing
    - testifylint

linters-settings:
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
  exhaustive:
    default-signifies-exhaustive: true
  nolintlint:
    require-explanation: true
    require-specific: true
