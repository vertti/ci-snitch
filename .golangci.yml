version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - gocritic
    - nolintlint
    # Error handling
    - errorlint
    - nilerr
    # Safety
    - bodyclose
    - forcetypeassert
    - gosec
    - nilnesserr
    # Code quality
    - predeclared
    - dupword
    # Modern Go idioms
    - modernize
    - perfsprint
    - exhaustive
    - intrange
    - copyloopvar
    # Consistency
    - recvcheck
    - nilnil
    # Testing
    - testifylint
    - thelper
    # SQL safety
    - sqlclosecheck
    - rowserrcheck
    # Bug detection
    - makezero
    - wastedassign
    - durationcheck
    - asasalint
    - errchkjson
    # Complexity
    - gocyclo
    # Code hygiene
    - goconst
    - usestdlibvars
    - nakedret
    - unparam
    - musttag
    - mirror
    - exptostd
    # Safety
    - fatcontext
    - reassign
    - bidichk
    - asciicheck
    - gocheckcompilerdirectives
    # Testing
    - usetesting
  settings:
    exhaustive:
      default-signifies-exhaustive: true
    gocyclo:
      min-complexity: 20
    goconst:
      min-occurrences: 3
    nolintlint:
      require-explanation: true
      require-specific: true
